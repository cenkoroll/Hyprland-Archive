################
##KITTY CONFIG##
################

##FONT
font_family      EnvyCodeR Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0

##CURSOR
cursor #cccccc
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval -1
cursor_trail 1
cursor_trail_decay 0.1 0.4

##PADDING
window_padding_width 10

##CONFIRM CLOSE
confirm_os_window_close 0

##LOOK
foreground #fdfbd4
background #14140f

##SHELL
shell .


